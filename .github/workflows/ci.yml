name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: expense_tracker_test
          POSTGRES_USER: expense_admin
          POSTGRES_PASSWORD: expense_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expense_admin -d expense_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://expense_admin:expense_password@localhost:5432/expense_tracker_test?schema=public
      - run: pnpm run lint
      - run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://expense_admin:expense_password@localhost:5432/expense_tracker_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci_access_secret_at_least_16_chars
          JWT_REFRESH_SECRET: ci_refresh_secret_at_least_16_chars
      - run: pnpm build
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://expense_admin:expense_password@localhost:5432/expense_tracker_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci_access_secret_at_least_16_chars
          JWT_REFRESH_SECRET: ci_refresh_secret_at_least_16_chars
