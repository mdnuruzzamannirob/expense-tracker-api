name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://expense_ci:expense_ci_password@localhost:5432/expense_tracker_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret_at_least_16_chars
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_16_chars
      CORS_ORIGIN: http://localhost:3000
      APP_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: expense_tracker_test
          POSTGRES_USER: expense_ci
          POSTGRES_PASSWORD: expense_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER -d expense_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm prisma:migrate deploy
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm typecheck:test
      - run: pnpm test:all
      - run: pnpm build
      - run: pnpm docs:generate
      - name: Verify generated API documentation is committed
        run: git diff --exit-code -- src/docs/openapi.json src/docs/postman-collection.json
      - name: Build production Docker image
        run: docker build --tag expense-tracker-api:ci .

  publish-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
