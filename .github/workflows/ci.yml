name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: expense_tracker_test
          POSTGRES_USER: ${{ secrets.CI_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ secrets.CI_POSTGRES_USER }} -d expense_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 11

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Create .env.test file
        run: echo "${{ secrets.CI_ENV_FILE }}" > .env.test

      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm prisma:migrate deploy
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm typecheck:test
      - run: pnpm test:all
      - run: pnpm build
